<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Gestión de Vehículos</title>
<link rel="stylesheet" href="css/styles.css">

<!-- Scripts -->
<script src="js/navbar.js"></script>
<script src="js/vehicle.js" defer></script>
</head>

<body class="vehicles">

<div id="navbar"></div>

<main class="container">

  <h1>Gestión de Vehículos</h1>

  <!-- Formulario Crear / Editar Vehículo -->
  <div class="card">
    <h2 id="formTitle">Agregar vehículo</h2>
    <form id="vehicleForm" class="vehicle-form">
      <div class="form-group">
        <label for="brand">Marca</label>
        <input type="text" id="brand" required>
      </div>

      <div class="form-group">
        <label for="model">Modelo</label>
        <input type="text" id="model" required>
      </div>

      <div class="form-group">
        <label for="year">Año</label>
        <input type="number" id="year" required min="1900" max="2100">
      </div>

      <div class="form-group">
        <label for="price">Precio</label>
        <input type="number" id="price" required min="0">
      </div>

      <div class="form-group">
        <label for="description">Descripción</label>
        <textarea id="description" rows="2"></textarea>
      </div>

      <div class="form-group">
        <label for="image">Imagen</label>
        <input type="file" id="image" accept="image/*">
        <img id="previewImage" src="" alt="Preview" style="display:none; width:120px; margin-top:5px;">
      </div>

      <div class="form-actions">
        <button type="submit" id="saveBtn">Guardar vehículo</button>
        <button type="button" id="cancelEdit" style="display:none;">Cancelar edición</button>
      </div>
    </form>
  </div>

  <!-- Lista de vehículos -->
  <h2>Mis vehículos</h2>
  <table>
    <thead>
      <tr>
        <th>Imagen</th>
        <th>Marca</th>
        <th>Modelo</th>
        <th>Año</th>
        <th>Precio</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="vehicleList"></tbody>
  </table>

</main>

<footer class="footer">
<p>TicoAuto © 2026</p>
</footer>
</body>
</html>
